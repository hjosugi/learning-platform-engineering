<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Realtime Transport Fallback</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        line-height: 1.5;
      }
      pre {
        background: #111827;
        color: #f9fafb;
        padding: 1rem;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h1>Realtime Transport Fallback</h1>
    <pre id="result"></pre>
    <script type="module">
      import { chooseTransport, detectCapabilities } from "./transport.mjs";

      const result = {
        capabilities: detectCapabilities(globalThis),
        decision: chooseTransport(detectCapabilities(globalThis)),
      };
      document.querySelector("#result").textContent = JSON.stringify(result, null, 2);
    </script>
  </body>
</html>
